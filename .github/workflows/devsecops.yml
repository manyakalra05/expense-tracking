name: Full Stack DevSecOps Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLIENT_URL: ${{ secrets.CLIENT_URL }}

    steps:
    # =====================
    # STEP 1 - Checkout
    # =====================
    - name: Checkout code
      uses: actions/checkout@v4

    # =====================
    # STEP 2 - Setup Node
    # =====================
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    # =====================
    # STEP 3 - Cache dependencies
    # =====================
    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

    # =====================
    # STEP 4 - Install dependencies
    # =====================
    - name: Install frontend deps
      run: |
        cd frontend/expense-tracker
        npm install

    - name: Install backend deps
      run: |
        cd backend
        npm install

    # =====================
    # STEP 5 - Lint (non-blocking)
    # =====================
    - name: Lint frontend
      run: |
        cd frontend/expense-tracker
        npm run lint || true

    - name: Lint backend
      run: |
        cd backend
        npm run lint || true

    # =====================
    # STEP 6 - Build frontend
    # =====================
    - name: Build frontend
      run: |
        cd frontend/expense-tracker
        npm run build

    # =====================
    # STEP 7 - Run backend (FIXED)
    # =====================
    - name: Start backend server
      run: |
        cd backend
        PORT=5000 npm start > server.log 2>&1 &
        sleep 10
        cat server.log

    # =====================
    # STEP 8 - Test backend API (FIXED)
    # =====================
    - name: Test backend API
      run: |
        for i in {1..5}; do
          curl http://localhost:5000 && break
          echo "Retrying..."
          sleep 3
        done

    # =====================
    # STEP 9 - Secret scan
    # =====================
    - name: Secret scan
      run: |
        echo "Scanning for hardcoded secrets..."
        grep -rE "(API_KEY|SECRET|TOKEN|PASSWORD)\s*=\s*['\"]" . \
          --exclude-dir=node_modules \
          --exclude-dir=.git \
          || true

    # =====================
    # STEP 10 - Block .env commit
    # =====================
    - name: Block .env file
      run: |
        if [ -f ".env" ]; then
          echo ".env file detected!"
          exit 1
        fi

    # =====================
    # STEP 11 - Dependency audit
    # =====================
    - name: Audit dependencies
      run: |
        cd backend && npm audit --audit-level=high || true
        cd ../frontend/expense-tracker && npm audit --audit-level=high || true

    # =====================
    # STEP 12 - Context-aware scan
    # =====================
    - name: Context scan
      run: |
        echo "Scanning for risky patterns..."
        grep -r "password" . \
          --exclude-dir=node_modules \
          --exclude-dir=.git \
          && echo "Review recommended"

    # =====================
    # STEP 13 - Deploy Frontend (Vercel)
    # =====================
    - name: Trigger Vercel Deploy
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Triggering Vercel deployment..."

        if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
          echo "Missing VERCEL_DEPLOY_HOOK"
          exit 1
        fi

        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")

        echo "Vercel response: $RESPONSE"

        if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 201 ]; then
          echo "Deployment failed"
          exit 1
        fi

    # =====================
    # STEP 14 - Deploy Backend (Render)
    # =====================
    - name: Trigger Render Deploy
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Triggering Render deployment..."

        if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
          echo "Missing RENDER_DEPLOY_HOOK"
          exit 1
        fi

        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

    # =====================
    # STEP 15 - Done
    # =====================
    - name: Done
      run: echo "DevSecOps pipeline completed successfully 🚀"
